global:
  scrape_interval: 60s
  evaluation_interval: 60s

scrape_configs:
  - job_name: "otel-collector"
    static_configs:
      - targets:
          - "otel-collector:8889"

  - job_name: "grafana"
    static_configs:
      - targets:
          - "grafana:3000"

  - job_name: "telemetry-services"
    scrape_interval: 30s
    static_configs:
      - targets:
          - "prometheus:9090"
          - "loki:3100"
          - "otel-collector:8888"
